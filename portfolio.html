<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #b8975a;
    --nav-bg: rgba(20,20,20,0.88);
    --nav-border: rgba(184,151,90,0.25);
  }

  html, body {
    width: 100%; height: 100%;
    background: #111;
    overflow: hidden;
    font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
    cursor: none;
  }

  /* CURSOR */
  #cursor {
    position: fixed; width: 6px; height: 6px;
    background: var(--gold); border-radius: 50%;
    pointer-events: none; z-index: 9999;
    transform: translate(-50%,-50%);
  }
  #cursor-ring {
    position: fixed; width: 28px; height: 28px;
    border: 1px solid rgba(184,151,90,0.5); border-radius: 50%;
    pointer-events: none; z-index: 9998;
    transform: translate(-50%,-50%);
    transition: width 0.2s, height 0.2s;
  }
  body:has(button:hover) #cursor-ring,
  body:has(.thumb:hover) #cursor-ring { width: 40px; height: 40px; }

  /* STAGE */
  #stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  #stage-inner {
    position: relative;
    width: 794px; height: 1123px;
    transform-origin: center center;
  }

  /* PAGE WRAPPERS */
  .pw {
    position: absolute; inset: 0;
    will-change: transform, opacity;
    pointer-events: none;
    transition: transform 0.65s cubic-bezier(0.76,0,0.24,1),
                opacity   0.55s cubic-bezier(0.76,0,0.24,1);
  }
  .pw[data-s="cur"]  { transform: translateX(0)     scale(1);    opacity: 1; pointer-events: all; z-index: 10; }
  .pw[data-s="next"] { transform: translateX(110%)  scale(0.94); opacity: 0; z-index: 5; }
  .pw[data-s="prev"] { transform: translateX(-110%) scale(0.94); opacity: 0; z-index: 5; }
  .pw[data-s="hide"] { transform: translateX(0)     scale(0.88); opacity: 0; z-index: 1; }

  /* A4 PAGE */
  .page {
    width: 100%; height: 100%;
    background: #1c1c1c;
    box-shadow: 0 8px 60px rgba(0,0,0,0.6), 0 2px 12px rgba(0,0,0,0.4);
    position: relative; overflow: hidden;
    cursor: zoom-in;
  }
  .page img {
    width: 100%; height: 100%;
    object-fit: contain;
    display: block;
    pointer-events: none;
    user-select: none;
    -webkit-user-drag: none;
  }
  /* placeholder */
  .ph {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px;
    pointer-events: none;
  }
  .ph-n {
    font-size: 88px; font-weight: 700;
    color: rgba(255,255,255,0.04); line-height: 1;
  }
  .ph-l {
    font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase;
    color: rgba(255,255,255,0.1);
  }

  /* NAV BAR */
  #nav {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    z-index: 100;
    display: flex; align-items: center; gap: 2px;
    background: var(--nav-bg);
    backdrop-filter: blur(20px) saturate(160%);
    border: 1px solid var(--nav-border);
    border-radius: 999px;
    padding: 8px 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .nb {
    background: none; border: none;
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    cursor: none; color: rgba(255,255,255,0.4);
    border-radius: 50%;
    transition: color 0.15s, background 0.15s;
  }
  .nb:hover { color: var(--gold); background: rgba(184,151,90,0.08); }
  .nb:disabled { opacity: 0.15; pointer-events: none; }
  .nb svg { width: 15px; height: 15px; }
  .nd { width: 1px; height: 18px; background: rgba(184,151,90,0.2); margin: 0 6px; }
  #nc {
    font-size: 11px; letter-spacing: 0.1em;
    color: rgba(255,255,255,0.3); padding: 0 10px;
    min-width: 52px; text-align: center;
  }
  #nc b { color: var(--gold); font-weight: 400; }

  /* THUMBNAIL STRIP */
  #thumbs {
    position: fixed; bottom: 82px; left: 50%; transform: translateX(-50%);
    z-index: 99;
    display: flex; gap: 5px; align-items: flex-end;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
  }
  #nav:hover ~ #thumbs, #thumbs:hover { opacity: 1; pointer-events: all; }
  .thumb {
    width: 26px; height: 37px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(184,151,90,0.15);
    border-radius: 2px; cursor: none;
    transition: transform 0.2s, border-color 0.15s;
    position: relative; overflow: hidden;
    display: flex; align-items: flex-end; justify-content: center;
    padding-bottom: 3px;
  }
  .thumb img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; opacity: 0.55; pointer-events: none;
  }
  .thumb span {
    position: relative; z-index: 1;
    font-size: 7px; color: rgba(255,255,255,0.25);
  }
  .thumb.on { border-color: var(--gold); transform: scaleY(1.18) translateY(-4px); }
  .thumb.on img { opacity: 1; }
  .thumb:hover { border-color: rgba(184,151,90,0.5); transform: scaleY(1.1) translateY(-2px); }

  /* LIGHTBOX */
  #lb {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(8,8,8,0.97);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  #lb.on { opacity: 1; pointer-events: all; }

  #lb-scroll {
    position: relative;
    width: 92vw; height: 92vh;
    overflow: scroll;
    display: flex; align-items: center; justify-content: center;
  }
  #lb-scroll::-webkit-scrollbar { display: none; }

  #lb-img {
    display: block;
    max-width: none;
    transform-origin: center center;
    cursor: grab;
    user-select: none;
    -webkit-user-drag: none;
    transition: transform 0.15s ease;
  }
  #lb-img:active { cursor: grabbing; }

  /* LB Controls */
  #lb-ctrl {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 2px;
    background: var(--nav-bg);
    backdrop-filter: blur(20px);
    border: 1px solid var(--nav-border);
    border-radius: 999px; padding: 8px 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .zb {
    background: none; border: none;
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    cursor: none; color: rgba(255,255,255,0.45);
    border-radius: 50%; font-size: 18px; line-height: 1;
    transition: color 0.15s, background 0.15s;
  }
  .zb:hover { color: var(--gold); background: rgba(184,151,90,0.08); }
  .zb.sm { font-size: 10px; letter-spacing: 0.05em; }

  #lb-close {
    position: fixed; top: 22px; right: 28px; z-index: 2;
    background: none; border: none; cursor: none;
    color: rgba(255,255,255,0.35); font-size: 22px;
    transition: color 0.15s, transform 0.2s;
  }
  #lb-close:hover { color: var(--gold); transform: rotate(90deg); }

  /* KEY HINT */
  #hint {
    position: fixed; top: 20px; left: 28px;
    font-size: 9px; letter-spacing: 0.12em;
    color: rgba(255,255,255,0.15); z-index: 100;
    pointer-events: none; line-height: 2;
  }
  #hint kbd {
    border: 1px solid rgba(255,255,255,0.1);
    padding: 1px 5px; border-radius: 2px; font-family: inherit;
  }
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>

<div id="stage"><div id="stage-inner"></div></div>

<nav id="nav">
  <button class="nb" id="b-first" title="最初へ">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <polyline points="11 17 6 12 11 7"/><line x1="18" y1="12" x2="6" y2="12"/>
    </svg>
  </button>
  <button class="nb" id="b-prev" title="前へ">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </button>
  <div class="nd"></div>
  <div id="nc"><b>1</b> / 20</div>
  <div class="nd"></div>
  <button class="nb" id="b-next" title="次へ">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <polyline points="9 18 15 12 9 6"/>
    </svg>
  </button>
  <button class="nb" id="b-last" title="最後へ">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <polyline points="13 17 18 12 13 7"/><line x1="6" y1="12" x2="18" y2="12"/>
    </svg>
  </button>
</nav>

<div id="thumbs"></div>

<div id="lb">
  <div id="lb-scroll">
    <img id="lb-img" src="" alt="">
  </div>
  <button id="lb-close">✕</button>
  <div id="lb-ctrl">
    <button class="zb" id="zi">＋</button>
    <button class="zb" id="zo">－</button>
    <div class="nd"></div>
    <button class="zb sm" id="zr">1:1</button>
    <div class="nd"></div>
    <button class="zb" id="lp">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="15" height="15"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="zb" id="ln">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="15" height="15"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
</div>

<div id="hint">
  <kbd>← →</kbd> ページ移動 &nbsp; <kbd>Z</kbd> 拡大 &nbsp; <kbd>ESC</kbd> 閉じる
</div>

<script>
// =============================================
// 各ページの画像パスをここに設定してください
// 例: 'images/page01.jpg'
// htmlファイルと同じフォルダに images/ フォルダを置く場合
// =============================================
const images = [
  'images/page01.jpg',  // 1
  'images/page02.jpg',  // 2
  'images/page03.jpg',  // 3
  'images/page04.jpg',  // 4
  'images/page05.jpg',  // 5
  'images/page06.jpg',  // 6
  'images/page07.jpg',  // 7
  'images/page08.jpg',  // 8
  'images/page09.jpg',  // 9
  'images/page10.jpg',  // 10
  'images/page11.jpg',  // 11
  'images/page12.jpg',  // 12
  'images/page13.jpg',  // 13
  'images/page14.jpg',  // 14
  'images/page15.jpg',  // 15
  'images/page16.jpg',  // 16
  'images/page17.jpg',  // 17
  'images/page18.jpg',  // 18
  'images/page19.jpg',  // 19
  'images/page20.jpg',  // 20
];

const TOTAL = images.length;
let cur = 0, busy = false;
let lbZoom = 1, lbIdx = 0;
let dragOn = false, dX = 0, dY = 0, sX = 0, sY = 0;
let mX = 0, mY = 0, rX = 0, rY = 0;

// Build pages
const si = document.getElementById('stage-inner');
const tb = document.getElementById('thumbs');

for (let i = 0; i < TOTAL; i++) {
  const pw = document.createElement('div');
  pw.className = 'pw';
  pw.dataset.i = i;
  pw.dataset.s = i === 0 ? 'cur' : 'hide';

  const pg = document.createElement('div');
  pg.className = 'page';

  if (images[i]) {
    const img = document.createElement('img');
    img.src = images[i]; img.alt = `Page ${i+1}`;
    pg.appendChild(img);
  } else {
    const ph = document.createElement('div');
    ph.className = 'ph';
    ph.innerHTML = `<div class="ph-n">${String(i+1).padStart(2,'0')}</div><div class="ph-l">image / page ${i+1}</div>`;
    pg.appendChild(ph);
  }

  pg.addEventListener('click', () => openLb(i));
  pw.appendChild(pg);
  si.appendChild(pw);

  // thumb
  const t = document.createElement('div');
  t.className = 'thumb' + (i === 0 ? ' on' : '');
  if (images[i]) {
    const ti = document.createElement('img'); ti.src = images[i];
    t.appendChild(ti);
  }
  t.appendChild(Object.assign(document.createElement('span'), { textContent: i + 1 }));
  t.addEventListener('click', () => go(i));
  tb.appendChild(t);
}

// Scale to viewport
function scale() {
  const s = Math.min((innerWidth - 80) / 794, (innerHeight - 100) / 1123, 1);
  si.style.transform = `scale(${s})`;
}
scale();
window.addEventListener('resize', scale);

// Navigate
function go(idx) {
  if (busy || idx < 0 || idx >= TOTAL || idx === cur) return;
  busy = true; cur = idx;
  document.querySelectorAll('.pw').forEach((p, i) => {
    const d = i - cur;
    p.dataset.s = d === 0 ? 'cur' : d > 0 ? 'next' : 'prev';
  });
  document.querySelectorAll('.thumb').forEach((t, i) => t.classList.toggle('on', i === cur));
  document.getElementById('nc').innerHTML = `<b>${cur+1}</b> / ${TOTAL}`;
  document.getElementById('b-prev').disabled = cur === 0;
  document.getElementById('b-first').disabled = cur === 0;
  document.getElementById('b-next').disabled = cur === TOTAL - 1;
  document.getElementById('b-last').disabled = cur === TOTAL - 1;
  setTimeout(() => { busy = false; }, 700);
}
go(0);

document.getElementById('b-prev').addEventListener('click', () => go(cur - 1));
document.getElementById('b-next').addEventListener('click', () => go(cur + 1));
document.getElementById('b-first').addEventListener('click', () => go(0));
document.getElementById('b-last').addEventListener('click', () => go(TOTAL - 1));

// Lightbox
const lb = document.getElementById('lb');
const lbScroll = document.getElementById('lb-scroll');
const lbImg = document.getElementById('lb-img');

function openLb(idx) {
  lbIdx = idx; lbZoom = 1;
  const src = images[idx];
  lbImg.src = src || '';
  lbImg.style.display = src ? 'block' : 'none';
  lbImg.style.transform = 'scale(1)';
  lbScroll.scrollTop = 0; lbScroll.scrollLeft = 0;
  lb.classList.add('on');
}
function closeLb() { lb.classList.remove('on'); }
function zoomSet(z) {
  lbZoom = Math.max(0.5, Math.min(5, z));
  lbImg.style.transform = `scale(${lbZoom})`;
}

document.getElementById('lb-close').addEventListener('click', closeLb);
lb.addEventListener('click', e => { if (e.target === lb || e.target === lbScroll) closeLb(); });
document.getElementById('zi').addEventListener('click', () => zoomSet(lbZoom + 0.5));
document.getElementById('zo').addEventListener('click', () => zoomSet(lbZoom - 0.5));
document.getElementById('zr').addEventListener('click', () => zoomSet(1));
document.getElementById('lp').addEventListener('click', e => {
  e.stopPropagation(); if (lbIdx > 0) { lbIdx--; go(lbIdx); openLb(lbIdx); }
});
document.getElementById('ln').addEventListener('click', e => {
  e.stopPropagation(); if (lbIdx < TOTAL-1) { lbIdx++; go(lbIdx); openLb(lbIdx); }
});

// Drag pan
lbImg.addEventListener('mousedown', e => {
  dragOn = true; dX = e.clientX; dY = e.clientY;
  sX = lbScroll.scrollLeft; sY = lbScroll.scrollTop;
  e.preventDefault();
});
document.addEventListener('mousemove', e => {
  if (!dragOn) return;
  lbScroll.scrollLeft = sX - (e.clientX - dX);
  lbScroll.scrollTop  = sY - (e.clientY - dY);
});
document.addEventListener('mouseup', () => { dragOn = false; });

// Wheel zoom in lb
lbScroll.addEventListener('wheel', e => {
  e.preventDefault();
  zoomSet(lbZoom + (e.deltaY < 0 ? 0.25 : -0.25));
}, { passive: false });

// Keyboard
document.addEventListener('keydown', e => {
  if (lb.classList.contains('on')) {
    if (e.key === 'Escape') closeLb();
    if (e.key === '+' || e.key === '=') zoomSet(lbZoom + 0.5);
    if (e.key === '-') zoomSet(lbZoom - 0.5);
    if (e.key === '0') zoomSet(1);
    if (e.key === 'ArrowRight') { if (lbIdx < TOTAL-1) { lbIdx++; go(lbIdx); openLb(lbIdx); } }
    if (e.key === 'ArrowLeft')  { if (lbIdx > 0)       { lbIdx--; go(lbIdx); openLb(lbIdx); } }
    return;
  }
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(cur + 1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(cur - 1);
  if (e.key === 'Home') go(0);
  if (e.key === 'End')  go(TOTAL - 1);
  if (e.key === 'z' || e.key === 'Z') openLb(cur);
});

// Wheel page nav
let wt = null;
document.addEventListener('wheel', e => {
  if (lb.classList.contains('on')) return;
  if (wt) return;
  go(e.deltaY > 20 ? cur + 1 : e.deltaY < -20 ? cur - 1 : cur);
  wt = setTimeout(() => { wt = null; }, 650);
}, { passive: true });

// Touch swipe
let tx = 0;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 50) go(dx < 0 ? cur + 1 : cur - 1);
}, { passive: true });

// Cursor
const ce = document.getElementById('cursor');
const cr = document.getElementById('cursor-ring');
document.addEventListener('mousemove', e => { mX = e.clientX; mY = e.clientY; });
(function anim() {
  rX += (mX - rX) * 0.14; rY += (mY - rY) * 0.14;
  ce.style.left = mX+'px'; ce.style.top = mY+'px';
  cr.style.left = rX+'px'; cr.style.top = rY+'px';
  requestAnimationFrame(anim);
})();
</script>
</body>
</html>
